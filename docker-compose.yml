version: '3.8'

services:
  # The main application container for running batch and ML jobs
  app:
    build: .
    container_name: flight_data_pipeline
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:2000
    depends_on:
      - mlflow
      - kafka
    command: tail -f /dev/null # Keeps the container alive for you to bash into

  # MLOps: MLflow Tracking Server
  mlflow:
    image: python:3.9-slim
    container_name: mlflow_server
    ports:
      - "2000:2000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c "pip install mlflow &&
               mlflow server --host 0.0.0.0 --port 2000 --backend-store-uri sqlite:///mlruns/mlflow.db"

  # Streaming: Zookeeper (Required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Streaming: Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka_broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
