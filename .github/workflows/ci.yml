name: Python CI Pipeline

# 1. When should this workflow run?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. What jobs should it do?
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step A: Grab your code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step B: Install the exact version of Python you use
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
        cache: 'pip' # Speeds up future runs by caching dependencies

    # Step C: Install your project requirements
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step D: Check code formatting
    - name: Check formatting with Black
      run: |
        black src/ tests/

    # Step E: Check for syntax errors and bad practices
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Step F: Run the unit tests we just wrote!
    - name: Run Unit Tests with pytest
      env:
        AWS_DEFAULT_REGION: "eu-west-1"
        AWS_ACCESS_KEY_ID: "testing"
        AWS_SECRET_ACCESS_KEY: "testing"
      run: |
        pytest tests/ -v
